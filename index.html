<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>zkTLS Proof Verifier</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="container">

<header>

<h1>🔐 zkTLS Proof Verifier</h1>

<p>Upload a zkTLS proof file and inspect verification metadata.</p>

</header>

<div class="upload-box">

<input type="file" id="proofFile">

<button onclick="verifyProof()">Verify Proof</button>

</div>

<div class="result-card">

<h3>Verification Result</h3>

<pre id="output">Waiting for proof file...</pre>

</div>

<footer>

<div class="footer-content">

<svg width="90" height="28" viewBox="0 0 100 30">
<rect width="100" height="30" rx="6" fill="#111827"/>
<text x="50" y="20" fill="#ffffff" font-size="14" text-anchor="middle">gorupa</text>
</svg>


</div>

</footer>

</div>

<script src="verifier.js"></script>
<script src="app.js"></script>

</body>
</html>
